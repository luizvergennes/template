name: Release

on:
  push:
    branches: [main]
    paths:
      - "apps/*/package.json"

env:
  REGISTRY: docker.lgvm.dev
  PROJECT_NAME: next-template

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      any: ${{ steps.build-matrix.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diff apps/*/package.json version field
        id: build-matrix
        run: |
          CHANGED='[]'
          for pkg in apps/*/package.json; do
            APP=$(basename "$(dirname "$pkg")")
            BEFORE=$(git show HEAD~1:"$pkg" 2>/dev/null | jq -r .version 2>/dev/null || echo "")
            AFTER=$(jq -r .version "$pkg")
            if [[ -n "$AFTER" && "$BEFORE" != "$AFTER" ]]; then
              CHANGED=$(jq -c --arg app "$APP" --arg v "$AFTER" '. += [{app:$app, version:$v}]' <<<"$CHANGED")
            fi
          done
          {
            echo "matrix={\"include\":$CHANGED}"
            echo "any=$(jq 'length > 0' <<<"$CHANGED")"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Skip if this version was already published
        id: check
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:${{ matrix.version }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute version tags
        id: version
        run: |
          V="${{ matrix.version }}"
          if ! [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$V' is not a bare semver (x.y.z) — refusing to tag."
            exit 1
          fi
          MAJOR=$(echo "$V" | cut -d. -f1)
          MAJOR_MINOR=$(echo "$V" | cut -d. -f1-2)
          SHORT_SHA=${GITHUB_SHA::7}
          {
            echo "full=$V"
            echo "major_minor=$MAJOR_MINOR"
            echo "major=$MAJOR"
            echo "short_sha=$SHORT_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ matrix.version }}
          secrets: |
            next_actions_key=${{ secrets.NEXT_ACTIONS_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:${{ steps.version.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:${{ steps.version.outputs.major_minor }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:${{ steps.version.outputs.major }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:sha-${{ steps.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:latest
          labels: |
            org.opencontainers.image.title=${{ matrix.app }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag the release
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ matrix.app }}-v${{ matrix.version }}"
          git tag "$TAG"
          git push origin "$TAG"
